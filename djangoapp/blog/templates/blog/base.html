<!-- Define o tipo de documento como HTML5 para o navegador -->
<!DOCTYPE html>
<!-- Inicia a tag HTML principal e define o idioma da página como inglês -->
<html lang="en">
<!-- Abre o cabeçalho, onde ficam as configurações e metadados da página -->
<head>
  <!-- Define a codificação de caracteres UTF-8 para exibir acentos corretamente -->
  <meta charset="UTF-8">  
  <!-- Garante a compatibilidade visual com o navegador Internet Explorer antigo -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">  
  <!-- Configura a responsividade para que a página se ajuste a celulares e tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <!-- Define o título que aparece na aba do navegador -->
  <title>Document</title>
<!-- Fecha a tag do cabeçalho -->
</head>
<!-- Abre o corpo da página, onde fica todo o conteúdo visível para o usuário -->
<body>
  {# Inicia o bloco de template Django chamado 'content' para ser preenchido por outras páginas #}
  {# Fecha o bloco de template Django chamado 'content' #}
  {% block content %}{% endblock content %}
<!-- Fecha a tag do corpo da página -->
</body>
<!-- Fecha a tag HTML principal e encerra o documento -->
</html>
